  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --navy-mid: #132040;
    --navy-light: #1e3160;
    --gold: #f5c842;
    --gold-dim: #c9a22a;
    --white: #ffffff;
    --gray-100: #f0f3f8;
    --gray-200: #dce3ef;
    --gray-400: #8a9ab8;
    --green: #22c55e;
    --card-hover: #1a2d55;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
    border-bottom: 3px solid var(--gold);
    padding: 20px 24px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .header-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 6px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.3px;
  }

  header p {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 4px;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 0;
  }

  /* DROPDOWN */
  .select-wrapper {
    position: relative;
    margin-bottom: 6px;
  }

  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 18px;
    pointer-events: none;
  }

  select {
    width: 100%;
    padding: 14px 44px 14px 16px;
    background: var(--navy-mid);
    color: var(--white);
    border: 2px solid var(--navy-light);
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus {
    border-color: var(--gold);
  }

  /* COUNT + HINT */
  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 2px;
  }

  .count-badge {
    font-size: 12px;
    color: var(--gray-400);
  }

  .count-badge span {
    color: var(--gold);
    font-weight: 600;
  }

  .page-info {
    color: var(--gray-400) !important;
    font-weight: 500 !important;
    font-size: 11px;
  }

  .hint {
    font-size: 11px;
    color: var(--gray-400);
    font-style: italic;
  }

  /* COMMENT CARDS */
  .comments-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .comment-card {
    background: var(--navy-mid);
    border: 1.5px solid var(--navy-light);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .comment-card:hover {
    background: var(--card-hover);
    border-color: var(--gold-dim);
  }

  .comment-card:active {
    transform: scale(0.98);
  }

  .comment-card.copied {
    border-color: var(--green);
    background: #0d2a1a;
  }

  .card-icon {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--navy-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    transition: background 0.15s;
    margin-top: 1px;
  }

  .comment-card.copied .card-icon {
    background: var(--green);
  }

  .card-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: #d0daea;
    flex: 1;
  }

  .copy-label {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--gray-400);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .comment-card:hover .copy-label {
    opacity: 1;
  }

  .comment-card.copied .copy-label {
    color: var(--green);
    opacity: 1;
  }

  /* PERSISTENT "ALREADY COPIED" BADGE — stays visible after the flash animation ends */
  .comment-card.was-copied {
    border-color: var(--green);
  }

  .already-copied-badge {
    flex-shrink: 0;
    display: none;
    align-items: center;
    gap: 4px;
    align-self: flex-start;
    margin-top: 1px;
    background: rgba(34, 197, 94, 0.15);
    color: var(--green);
    border: 1px solid rgba(34, 197, 94, 0.4);
    border-radius: 20px;
    padding: 3px 9px 3px 7px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .comment-card.was-copied .already-copied-badge {
    display: flex;
  }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .page-btn {
    min-width: 36px;
    height: 36px;
    padding: 0 8px;
    background: var(--navy-mid);
    color: var(--white);
    border: 1.5px solid var(--navy-light);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .page-btn:hover:not(:disabled) {
    background: var(--card-hover);
    border-color: var(--gold-dim);
  }

  .page-btn.active {
    background: var(--gold);
    color: var(--navy);
    border-color: var(--gold);
  }

  .page-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .page-ellipsis {
    color: var(--gray-400);
    font-size: 13px;
    padding: 0 2px;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: var(--navy);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
  }

  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 3px; }
</style>
</head>

const topicIcons = {
  achievements: '🏆', goodDeeds: '❤️', communityReminders: '📢',
  successfulOps: '🚔', goodNews: '📰', pressBriefing: '🎙️',
  awards: '🎖️', congratulations: '🎉', flagRaising: '🇵🇭',
  mourning: '🕊️', cyberScam: '🔐'
};

const PAGE_SIZE = 10;
let currentPage = 1;
let currentTopic = '';

// Tracks which comments have already been copied, per topic, for this session.
// Structure: { topicKey: Set(indices) }
const copiedTracker = {};

let toastTimeout;

function loadComments() {
  const topic = document.getElementById('topicSelect').value;
  const list = document.getElementById('commentsList');
  const metaRow = document.getElementById('metaRow');
  const countEl = document.getElementById('commentCount');
  const pagination = document.getElementById('pagination');

  // Reset to page 1 whenever the topic changes
  if (topic !== currentTopic) {
    currentPage = 1;
    currentTopic = topic;
  }

  if (!topic) {
    list.innerHTML = '<div class="empty"><div class="icon">💬</div><p>Select a topic above to see all available comments</p></div>';
    metaRow.style.display = 'none';
    pagination.style.display = 'none';
    pagination.innerHTML = '';
    return;
  }

  const data = comments[topic] || [];
  const icon = topicIcons[topic] || '💬';
  countEl.textContent = data.length;
  metaRow.style.display = 'flex';

  renderPage(topic, data, icon);
}

function renderPage(topic, data, icon) {
  const list = document.getElementById('commentsList');
  const pagination = document.getElementById('pagination');
  const pageInfo = document.getElementById('pageInfo');

  const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  if (pageInfo) {
    pageInfo.textContent = totalPages > 1 ? `· Page ${currentPage} of ${totalPages}` : '';
  }

  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageItems = data.slice(startIdx, startIdx + PAGE_SIZE);

  if (!copiedTracker[topic]) copiedTracker[topic] = new Set();
  const copiedSet = copiedTracker[topic];

  list.innerHTML = pageItems.map((text, localI) => {
    const globalIndex = startIdx + localI;
    const wasCopied = copiedSet.has(globalIndex);
    return `
    <div class="comment-card${wasCopied ? ' was-copied' : ''}" onclick="copyComment(this, ${globalIndex})" data-text="${text.replace(/"/g, '&quot;')}" data-topic="${topic}">
      <div class="card-icon" id="icon-${globalIndex}">${icon}</div>
      <div class="card-text">${text}</div>
      <span class="already-copied-badge" id="badge-${globalIndex}">✓ Copied</span>
      <span class="copy-label" id="label-${globalIndex}">${wasCopied ? 'TAP TO COPY AGAIN' : 'TAP TO COPY'}</span>
    </div>
  `;
  }).join('');

  renderPagination(topic, data, icon, totalPages);
}

function renderPagination(topic, data, icon, totalPages) {
  const pagination = document.getElementById('pagination');

  if (totalPages <= 1) {
    pagination.style.display = 'none';
    pagination.innerHTML = '';
    return;
  }

  pagination.style.display = 'flex';

  const buttons = [];

  buttons.push(`<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})" aria-label="Previous page">‹</button>`);

  const pageNumbers = getPageNumbers(currentPage, totalPages);
  pageNumbers.forEach(p => {
    if (p === '...') {
      buttons.push('<span class="page-ellipsis">⋯</span>');
    } else {
      buttons.push(`<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`);
    }
  });

  buttons.push(`<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})" aria-label="Next page">›</button>`);

  pagination.innerHTML = buttons.join('');
}

// Builds a compact page-number list like: 1 ... 4 5 6 ... 12
// For small page counts, just show every page number (no ellipsis needed).
function getPageNumbers(current, total) {
  if (total <= 7) {
    const all = [];
    for (let i = 1; i <= total; i++) all.push(i);
    return all;
  }

  const delta = 1;
  const range = [];
  for (let i = Math.max(1, current - delta); i <= Math.min(total, current + delta); i++) {
    range.push(i);
  }

  const withEdges = [];
  if (range[0] > 1) {
    withEdges.push(1);
    if (range[0] > 2) withEdges.push('...');
  }
  withEdges.push(...range);
  if (range[range.length - 1] < total) {
    if (range[range.length - 1] < total - 1) withEdges.push('...');
    withEdges.push(total);
  }
  return withEdges;
}

function goToPage(page) {
  const totalPages = Math.max(1, Math.ceil((comments[currentTopic] || []).length / PAGE_SIZE));
  if (page < 1 || page > totalPages || page === currentPage) return;
  currentPage = page;
  const data = comments[currentTopic] || [];
  const icon = topicIcons[currentTopic] || '💬';
  renderPage(currentTopic, data, icon);

  // Scroll back to top of the list for easier reading on page change
  document.getElementById('commentsList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyComment(card, index) {
  const text = card.getAttribute('data-text');
  const topic = card.getAttribute('data-topic');

  // Clipboard API
  navigator.clipboard.writeText(text).then(() => {
    showCopied(card, index, topic);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(card, index, topic);
  });
}

function showCopied(card, index, topic) {
  // Mark this comment as permanently "already copied" for the session
  if (!copiedTracker[topic]) copiedTracker[topic] = new Set();
  copiedTracker[topic].add(index);
  card.classList.add('was-copied');

  card.classList.add('copied');
  const iconEl = document.getElementById('icon-' + index);
  const labelEl = document.getElementById('label-' + index);
  const origIcon = iconEl.textContent;

  iconEl.textContent = '✓';
  if (labelEl) labelEl.textContent = 'COPIED!';

  // Toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);

  // Reset the transient flash state after 2.5s, but keep the persistent "already copied" badge
  setTimeout(() => {
    card.classList.remove('copied');
    iconEl.textContent = origIcon;
    if (labelEl) labelEl.textContent = 'TAP TO COPY AGAIN';
  }, 2500);
}
</script>
