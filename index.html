const topicIcons = {
  achievements: '🏆', goodDeeds: '❤️', communityReminders: '📢',
  successfulOps: '🚔', goodNews: '📰', pressBriefing: '🎙️',
  awards: '🎖️', congratulations: '🎉', flagRaising: '🇵🇭',
  mourning: '🕊️', cyberScam: '🔐',
  drugOps: '💊', smuggledFakeOps: '📦', hviWantedOps: '🎯'
};

const PAGE_SIZE = 10;
let currentPage = 1;
let currentTopic = '';

// Tracks which comments have already been copied, per topic, for this session.
// Structure: { topicKey: Set(indices) }
const copiedTracker = {};

let toastTimeout;

function loadComments() {
  const topic = document.getElementById('topicSelect').value;
  const list = document.getElementById('commentsList');
  const metaRow = document.getElementById('metaRow');
  const countEl = document.getElementById('commentCount');
  const pagination = document.getElementById('pagination');

  // Reset to page 1 whenever the topic changes
  if (topic !== currentTopic) {
    currentPage = 1;
    currentTopic = topic;
  }

  if (!topic) {
    list.innerHTML = '<div class="empty"><div class="icon">💬</div><p>Select a topic above to see all available comments</p></div>';
    metaRow.style.display = 'none';
    pagination.style.display = 'none';
    pagination.innerHTML = '';
    return;
  }

  const data = comments[topic] || [];
  const icon = topicIcons[topic] || '💬';
  countEl.textContent = data.length;
  metaRow.style.display = 'flex';

  renderPage(topic, data, icon);
}

function renderPage(topic, data, icon) {
  const list = document.getElementById('commentsList');
  const pagination = document.getElementById('pagination');
  const pageInfo = document.getElementById('pageInfo');

  const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  if (pageInfo) {
    pageInfo.textContent = totalPages > 1 ? `· Page ${currentPage} of ${totalPages}` : '';
  }

  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageItems = data.slice(startIdx, startIdx + PAGE_SIZE);

  if (!copiedTracker[topic]) copiedTracker[topic] = new Set();
  const copiedSet = copiedTracker[topic];

  list.innerHTML = pageItems.map((text, localI) => {
    const globalIndex = startIdx + localI;
    const wasCopied = copiedSet.has(globalIndex);
    const delay = (localI * 0.04).toFixed(2);
    return `
    <div class="comment-card${wasCopied ? ' was-copied' : ''}" style="animation-delay: ${delay}s" onclick="copyComment(this, ${globalIndex})" data-text="${text.replace(/"/g, '&quot;')}" data-topic="${topic}">
      <div class="card-icon" id="icon-${globalIndex}">${icon}</div>
      <div class="card-text">${text}</div>
      <span class="already-copied-badge" id="badge-${globalIndex}">✓ Copied</span>
      <span class="copy-label" id="label-${globalIndex}">${wasCopied ? 'TAP TO COPY AGAIN' : 'TAP TO COPY'}</span>
    </div>
  `;
  }).join('');

  renderPagination(topic, data, icon, totalPages);
}

function renderPagination(topic, data, icon, totalPages) {
  const pagination = document.getElementById('pagination');

  if (totalPages <= 1) {
    pagination.style.display = 'none';
    pagination.innerHTML = '';
    return;
  }

  pagination.style.display = 'flex';

  const buttons = [];

  buttons.push(`<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})" aria-label="Previous page">‹</button>`);

  const pageNumbers = getPageNumbers(currentPage, totalPages);
  pageNumbers.forEach(p => {
    if (p === '...') {
      buttons.push('<span class="page-ellipsis">⋯</span>');
    } else {
      buttons.push(`<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})">${p}</button>`);
    }
  });

  buttons.push(`<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})" aria-label="Next page">›</button>`);

  pagination.innerHTML = buttons.join('');
}

// Builds a compact page-number list like: 1 ... 4 5 6 ... 12
// For small page counts, just show every page number (no ellipsis needed).
function getPageNumbers(current, total) {
  if (total <= 7) {
    const all = [];
    for (let i = 1; i <= total; i++) all.push(i);
    return all;
  }

  const delta = 1;
  const range = [];
  for (let i = Math.max(1, current - delta); i <= Math.min(total, current + delta); i++) {
    range.push(i);
  }

  const withEdges = [];
  if (range[0] > 1) {
    withEdges.push(1);
    if (range[0] > 2) withEdges.push('...');
  }
  withEdges.push(...range);
  if (range[range.length - 1] < total) {
    if (range[range.length - 1] < total - 1) withEdges.push('...');
    withEdges.push(total);
  }
  return withEdges;
}

function goToPage(page) {
  const totalPages = Math.max(1, Math.ceil((comments[currentTopic] || []).length / PAGE_SIZE));
  if (page < 1 || page > totalPages || page === currentPage) return;
  currentPage = page;
  const data = comments[currentTopic] || [];
  const icon = topicIcons[currentTopic] || '💬';
  renderPage(currentTopic, data, icon);

  // Scroll back to top of the list for easier reading on page change
  document.getElementById('commentsList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyComment(card, index) {
  const text = card.getAttribute('data-text');
  const topic = card.getAttribute('data-topic');

  // Clipboard API
  navigator.clipboard.writeText(text).then(() => {
    showCopied(card, index, topic);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(card, index, topic);
  });
}

function showCopied(card, index, topic) {
  // Mark this comment as permanently "already copied" for the session
  if (!copiedTracker[topic]) copiedTracker[topic] = new Set();
  copiedTracker[topic].add(index);
  card.classList.add('was-copied');

  card.classList.add('copied');
  const iconEl = document.getElementById('icon-' + index);
  const labelEl = document.getElementById('label-' + index);
  const origIcon = iconEl.textContent;

  iconEl.textContent = '✓';
  if (labelEl) labelEl.textContent = 'COPIED!';

  // Toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);

  // Reset the transient flash state after 2.5s, but keep the persistent "already copied" badge
  setTimeout(() => {
    card.classList.remove('copied');
    iconEl.textContent = origIcon;
    if (labelEl) labelEl.textContent = 'TAP TO COPY AGAIN';
  }, 2500);
}

// --- GO TO TOP BUTTON ---
const goTopBtn = document.getElementById('goTopBtn');

function updateGoTopVisibility() {
  if (window.scrollY > 320) {
    goTopBtn.classList.add('visible');
  } else {
    goTopBtn.classList.remove('visible');
  }
}

window.addEventListener('scroll', updateGoTopVisibility, { passive: true });
updateGoTopVisibility();

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
